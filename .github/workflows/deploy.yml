name: Deploy to Firebase Hosting

# Автоматический деплой при каждом пуше в main.
# Требует секрет репозитория FIREBASE_SERVICE_ACCOUNT_PLANNER_C6545 (JSON-ключ сервисного
# аккаунта Firebase, создан командой `firebase init hosting:github`).
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_PLANNER_C6545 }}"
          projectId: planner-c6545
          channelId: live
